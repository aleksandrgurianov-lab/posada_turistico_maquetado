<!doctype html>
<html lang="es" class="h-full bg-[#1C1917]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | Luxury Hotels</title>

    <link rel="stylesheet" href="./dist/output.css" />
    <style>
      .glow-effect {
        box-shadow: 0 4px 30px rgba(180, 83, 9, 0.2);
      }
    </style>
  </head>
  <body
    class="h-full font-sans antialiased text-stone-200 m-0 p-0 bg-[#1C1917]"
  >
    <div class="absolute top-6 right-6 z-20">
      <div class="relative inline-block text-left">
        <button
          type="button"
          class="inline-flex items-center gap-x-1.5 rounded-md px-3 py-2 text-sm font-medium text-stone-200 bg-[#2E2A24] border border-[#B45309]/40 hover:border-[#B45309] transition-colors cursor-pointer"
        >
          <span>ES</span>
          <svg
            class="h-4 w-4 text-stone-400"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
      </div>
    </div>

    <div class="flex min-h-screen">
      <div
        class="relative hidden w-64 flex-1 lg:block overflow-hidden rounded-[0_40px_40px_0]"
      >
        <img
          class="absolute inset-0 h-full object-cover w-full"
          src="./imagines_dist/login_bienvenidos.png"
          alt="Hotel Premium"
        />

        <div
          class="absolute inset-0 flex flex-col justify-center p-1 text-white z-10 h-fit py-[40px] top-1/2 -translate-y-1/2 px-[80px] bg-stone-900/80 gap-6"
        >
          <h1
            class="font-secondary text-[76px] text-[#fafaf9] font-normal leading-[110%]"
          >
            Encuentra tu <br />
            próximo <br />
            descanso.
          </h1>
          <p
            class="font-family text-2xl uppercase font-normal text-[#b45309] leading-[150%]"
          >
            Experiencias exclusivas & confort <br />
            absoluto
          </p>
        </div>
      </div>

      <div
        class="flex flex-1 flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:px-20 xl:px-24 w-1/2"
      >
        <div
          class="mx-auto w-full max-w-[540px] lg:w-[100%] rounded-[12px] p-[40px] border border-solid border-[#2e2a24]"
          style="box-shadow: 0 -2px 36px 0 rgba(180, 83, 9, 0.3)"
        >
          <div class="text-center lg:text-left">
            <div class="flex justify-center lg:justify-center mb-6">
              <img src="./imagines_dist/logo.svg" alt="Logo" />
            </div>

            <h2
              id="form-title"
              class="font-secondary font-normal text-5xl text-[#fafaf9] leading-[110%]"
            >
              Bienvenido de nuevo
            </h2>
            <p
              id="form-subtitle"
              class="mt-2 text-sm text-stone-400 font-light"
            >
              Ingresa tus credenciales para acceder a tu panel.
            </p>
          </div>

          <!-- БЛОК С ФОРМОЙ -->
          <div class="mt-8">
            <form action="#" method="POST" class="flex flex-col gap-5">
              <!-- Поле: Email -->
              <div>
                <label
                  for="email"
                  class="block text-xs font-medium tracking-wider text-stone-400 uppercase"
                  >Correo Electrónico</label
                >
                <div class="mt-1.5">
                  <input
                    id="email"
                    name="email"
                    type="email"
                    required
                    placeholder="correo@ejemplo.com"
                    class="block w-full rounded-md border border-[#B45309]/15 bg-[#2E2A24] px-3 py-2.5 text-white placeholder-stone-500 focus:border-[#B45309] focus:ring-1 focus:ring-[#B45309] focus:outline-none sm:text-sm transition-colors duration-200"
                  />
                </div>
              </div>

              <div>
                <label
                  for="password"
                  class="block text-xs font-medium tracking-wider text-stone-400 uppercase"
                  >Contraseña</label
                >
                <div class="mt-1.5">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    placeholder="••••••••"
                    class="block w-full rounded-md border border-[#B45309]/15 bg-[#2E2A24] px-3 py-2.5 text-white placeholder-stone-500 focus:border-[#B45309] focus:ring-1 focus:ring-[#B45309] focus:outline-none sm:text-sm transition-colors duration-200"
                  />
                </div>
              </div>

              <!-- Опции -->
              <div
                id="remember-me-container"
                class="flex items-center justify-between text-sm"
              >
                <div class="flex items-center">
                  <input
                    id="remember-me"
                    name="remember-me"
                    type="checkbox"
                    class="h-4 w-4 rounded border-[#B45309]/30 text-[#B45309] focus:ring-[#B45309] accent-[#B45309]"
                  />
                  <label
                    for="remember-me"
                    class="ml-2 block text-stone-400 font-light select-none"
                    >Recordarme</label
                  >
                </div>
                <div>
                  <a
                    href="#"
                    class="font-light text-stone-400 hover:text-[#B45309] transition-colors"
                    >¿Olvidaste tu contraseña?</a
                  >
                </div>
              </div>

              <!-- Главная кнопка -->
              <div class="pt-2">
                <button
                  type="submit"
                  id="submit-btn"
                  class="glow-effect flex w-full justify-center rounded-md bg-[#B45309] px-3 py-2.5 text-sm font-medium tracking-wide text-white hover:bg-[#b45309]/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#B45309] transition-colors uppercase cursor-pointer"
                >
                  Iniciar Sesión
                </button>
              </div>
            </form>
          </div>

          <!-- Переключатель Вход / Регистрация -->
          <div class="mt-6 text-center">
            <p class="text-sm text-stone-400 font-light">
              <span id="switch-text">¿No tienes una cuenta?</span>
              <button
                type="button"
                id="switch-btn"
                class="font-medium text-[#B45309] hover:text-[#B45309]/80 ml-1 underline cursor-pointer transition-colors"
              >
                Regístrate
              </button>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
